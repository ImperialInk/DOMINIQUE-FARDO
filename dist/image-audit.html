* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 20px; }
h1 { margin-bottom: 10px; color: #fff; }
h2 { margin: 30px 0 15px; color: #ccc; border-bottom: 1px solid #333; padding-bottom: 8px; }
.summary { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 30px; }
.summary span { display: inline-block; margin-right: 20px; }
.ok { color: #4caf50; }
.broken { color: #f44336; }
.warn { color: #ff9800; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
.card { background: #2a2a2a; border-radius: 8px; overflow: hidden; border: 2px solid #333; }
.card.loaded { border-color: #4caf50; }
.card.failed { border-color: #f44336; }
.card .thumb { width: 100%; height: 150px; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.card .thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
.card .info { padding: 10px; font-size: 12px; }
.card .info .name { font-weight: bold; word-break: break-all; margin-bottom: 4px; color: #fff; }
.card .info .path { color: #888; word-break: break-all; margin-bottom: 4px; }
.card .info .status { font-weight: bold; }

table { width: 100%; border-collapse: collapse; margin-bottom: 40px; font-size: 13px; }
th, td { padding: 8px 10px; border: 1px solid #333; text-align: left; vertical-align: top; }
th { background: #2a2a2a; color: #fff; position: sticky; top: 0; }
tr:nth-child(even) { background: #222; }
td.path { word-break: break-all; max-width: 250px; }
</style>

let loaded = 0, failed = 0, total = imgFiles.length;

function createCard(filename, basePath) {
  const card = document.createElement('div');
  card.className = 'card';
  const thumbDiv = document.createElement('div');
  thumbDiv.className = 'thumb';
  const img = document.createElement('img');
  img.src = basePath + filename;
  img.alt = filename;
  img.onload = function() {
    if (this.naturalWidth === 0) {
      card.classList.add('failed');
      failed++;
    } else {
      card.classList.add('loaded');
      loaded++;
    }
    updateSummary();
  };
  img.onerror = function() {
    card.classList.add('failed');
    failed++;
    updateSummary();
  };
  thumbDiv.appendChild(img);

  const info = document.createElement('div');
  info.className = 'info';
  const isUnreferenced = unreferencedFiles.includes(filename);
  info.innerHTML = `
    <div class="name">${filename}</div>
    <div class="path">${basePath}${filename}</div>
    <div class="status">Loading...</div>
    ${isUnreferenced ? '<div style="color:#ff9800;margin-top:4px;">NOT referenced by any page - possible replacement source</div>' : ''}
  `;

  card.appendChild(thumbDiv);
  card.appendChild(info);

  setTimeout(() => {
    const status = info.querySelector('.status');
    if (card.classList.contains('loaded')) {
      status.innerHTML = '<span class="ok">LOADED OK</span>';
    } else {
      status.innerHTML = '<span class="broken">FAILED / 0 bytes</span>';
    }
  }, 3000);

  return card;
}

function updateSummary() {
  document.getElementById('summary').innerHTML = `
    <span>Total files: <strong>${total}</strong></span>
    <span class="ok">Loaded: <strong>${loaded}</strong></span>
    <span class="broken">Failed/Empty: <strong>${failed}</strong></span>
    <span class="warn">Pending: <strong>${total - loaded - failed}</strong></span>
  `;
}

  const tr = document.createElement('tr');
  const img = new Image();
  img.src = ref.path;

  const previewTd = document.createElement('td');
  const previewImg = document.createElement('img');
  previewImg.src = ref.path;
  previewImg.style.maxWidth = '80px';
  previewImg.style.maxHeight = '50px';
  previewTd.appendChild(previewImg);

  const existsTd = document.createElement('td');
  const loadsTd = document.createElement('td');

  img.onload = function() {
    existsTd.innerHTML = '<span class="ok">Yes</span>';
    if (this.naturalWidth === 0) {
      loadsTd.innerHTML = '<span class="broken">No (0 bytes)</span>';
    } else {
      loadsTd.innerHTML = '<span class="ok">Yes</span>';
    }
  };
  img.onerror = function() {
    existsTd.innerHTML = '<span class="broken">No (404)</span>';
    loadsTd.innerHTML = '<span class="broken">No</span>';
  };

  const possibleMatch = ref.path.endsWith('.jpg') || ref.path.endsWith('.png')
    ? unreferencedFiles.map(f => '/img/' + f).join(', ')
    : '-';

  tr.innerHTML = `
    <td>${ref.page}</td>
    <td class="path">${ref.path}</td>
    <td>${ref.type}</td>
  `;
  tr.appendChild(existsTd);
  tr.appendChild(loadsTd);
  tr.appendChild(previewTd);
  const matchTd = document.createElement('td');
  matchTd.className = 'path';
  matchTd.textContent = ref.path.endsWith('.svg') ? 'SVG - should work' : 'Needs real image data';
